<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FeelForm OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ff-root">
  <div class="ff-env">
    <button id="ff-console-toggle" class="ff-console-toggle">OS</button>

    <div id="ff-console" class="ff-console">
      <div class="ff-console-title">FeelForm Console</div>

      <div class="ff-console-section">Timing</div>
      <div class="ff-console-timing-row"><span>Drift</span><span id="timing-drift" class="ff-console-timing-dot"></span></div>
      <div class="ff-console-timing-row"><span>Pulse</span><span id="timing-pulse" class="ff-console-timing-dot"></span></div>

      <div class="ff-console-section">Nav Map</div>
      <div id="ff-nav-map" class="ff-console-nav-map"></div>

      <div class="ff-console-section">Log</div>
      <div id="ff-log" class="ff-console-log"></div>
    </div>

    <div class="ff-chambers">

      <div id="ch-baseline" class="ff-chamber is-active">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Baseline</div>
          <div class="ff-subtitle">Centering</div>
        </div></div>
      </div>

      <div id="ch-threshold" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Threshold</div>
          <div class="ff-subtitle">Crossing</div>
        </div></div>
      </div>

      <div id="ch-pulse" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Pulse</div>
          <div class="ff-subtitle">Activation</div>
        </div></div>
      </div>

      <div id="ch-somatic" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Somatic</div>
          <div class="ff-subtitle">Embodiment</div>
        </div></div>
      </div>

      <div id="ch-reflection" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Reflection</div>
          <textarea id="ff-reflect-input" class="ff-reflection-area" placeholder="What are you noticing?"></textarea>
          <div id="ff-reflect-output" class="ff-output-block"></div>
        </div></div>
      </div>

      <div id="ch-decision" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Decision</div>
          <div class="ff-decision-grid">
            <div>
              <div>Path A</div>
              <input id="ff-decision-a" class="ff-decision-input" placeholder="Option A">
            </div>
            <div>
              <div>Path B</div>
              <input id="ff-decision-b" class="ff-decision-input" placeholder="Option B">
            </div>
          </div>
          <div id="ff-decision-output" class="ff-output-block"></div>
        </div></div>
      </div>

      <div id="ch-identity" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Identity</div>
          <textarea id="ff-identity-input" class="ff-identity-input" placeholder="Who are you becoming?"></textarea>
          <div id="ff-identity-output" class="ff-output-block"></div>
        </div></div>
      </div>

      <div id="ch-ritual" class="ff-chamber">
        <div class="ff-core"><div class="ff-core-inner">
          <div class="ff-label">Ritual</div>
          <div id="ff-ritual-step" class="ff-ritual-step">Step 1</div>
          <div id="ff-ritual-sub" class="ff-ritual-sub">Begin the sequence.</div>
        </div></div>
      </div>

    </div>

    <div class="ff-nav">
      <div id="nav-baseline" class="ff-nav-glyph"></div>
      <div id="nav-threshold" class="ff-nav-glyph"></div>
      <div id="nav-pulse" class="ff-nav-glyph"></div>
      <div id="nav-somatic" class="ff-nav-glyph"></div>
      <div id="nav-reflection" class="ff-nav-glyph"></div>
      <div id="nav-decision" class="ff-nav-glyph"></div>
      <div id="nav-identity" class="ff-nav-glyph"></div>
      <div id="nav-ritual" class="ff-nav-glyph"></div>
    </div>

  </div>
</div>

<script src="ff-console.js"></script>
</body>
</html>
